accessguard.dashboard:
  path: '/admin/reports/accessguard'
  defaults:
    _controller: 'Drupal\accessguard\Controller\DashboardController::overview'
    _title: 'AccessGuard compliance'
  requirements:
    _permission: 'view accessguard reports'

accessguard.audit_export:
  path: '/admin/reports/accessguard/export'
  defaults:
    _controller: 'Drupal\accessguard\Controller\DashboardController::exportCsv'
    _title: 'Export AccessGuard audit'
  requirements:
    _permission: 'view accessguard reports'

accessguard.node_detail:
  path: '/admin/reports/accessguard/node/{node}'
  defaults:
    _controller: 'Drupal\accessguard\Controller\DashboardController::detail'
    _title: 'AccessGuard: page detail'
  requirements:
    _permission: 'view accessguard reports'
    _entity_access: 'node.view'
    node: \d+
  options:
    parameters:
      node:
        type: 'entity:node'

accessguard.waive:
  path: '/admin/reports/accessguard/node/{node}/waive'
  defaults:
    _form: 'Drupal\accessguard\Form\WaiveForm'
    _title: 'Waive violation'
  requirements:
    _permission: 'triage accessguard violations'
    _entity_access: 'node.view'
    node: \d+
  options:
    parameters:
      node:
        type: 'entity:node'

accessguard.unwaive:
  path: '/admin/reports/accessguard/node/{node}/unwaive'
  defaults:
    _form: 'Drupal\accessguard\Form\UnwaiveForm'
    _title: 'Remove waiver'
  requirements:
    _permission: 'triage accessguard violations'
    _entity_access: 'node.view'
    node: \d+
  options:
    parameters:
      node:
        type: 'entity:node'

accessguard.settings_form:
  path: '/admin/config/system/accessguard'
  defaults:
    _form: 'Drupal\accessguard\Form\SettingsForm'
    _title: 'AccessGuard settings'
  requirements:
    _permission: 'administer accessguard'

accessguard.analytics_rules:
  path: '/admin/reports/accessguard/rules'
  defaults:
    _controller: 'Drupal\accessguard\Controller\AnalyticsController::byRule'
    _title: 'AccessGuard: by rule'
  requirements:
    _permission: 'view accessguard reports'

accessguard.analytics_authors:
  path: '/admin/reports/accessguard/authors'
  defaults:
    _controller: 'Drupal\accessguard\Controller\AnalyticsController::byAuthor'
    _title: 'AccessGuard: by author'
  requirements:
    _permission: 'view accessguard reports'

accessguard.audit_export_pdf:
  path: '/admin/reports/accessguard/export/pdf'
  defaults:
    _controller: 'Drupal\accessguard\Controller\DashboardController::exportPdf'
    _title: 'Export AccessGuard PDF'
  requirements:
    _permission: 'view accessguard reports'
