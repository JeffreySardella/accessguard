services:
  accessguard.scan_runner:
    class: Drupal\accessguard\Service\ScanRunner
    arguments: ['@http_client', '@config.factory']
  accessguard.scan_recorder:
    class: Drupal\accessguard\Service\ScanRecorder
    arguments: ['@entity_type.manager', '@database']
  accessguard.regression:
    class: Drupal\accessguard\Service\RegressionService
    arguments: ['@entity_type.manager']
  accessguard.scan_repository:
    class: Drupal\accessguard\Repository\ScanRepository
    arguments: ['@database']
  accessguard.waiver_matcher:
    class: Drupal\accessguard\Service\WaiverMatcher
    arguments: ['@entity_type.manager']
  accessguard.violation_analytics:
    class: Drupal\accessguard\Service\ViolationAnalytics
    arguments: ['@entity_type.manager', '@accessguard.scan_repository', '@accessguard.waiver_matcher', '@current_user']
