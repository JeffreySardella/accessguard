accessguard.settings:
  type: config_object
  label: 'AccessGuard settings'
  mapping:
    scanner_endpoint:
      type: string
      label: 'Scanner service endpoint'
    scanner_auth_token:
      type: string
      label: 'Scanner service shared-secret token'
    gate_enabled:
      type: boolean
      label: 'Enable publish gating'
    gate_threshold:
      type: string
      label: 'Gating severity threshold'
    rescan_enabled:
      type: boolean
      label: 'Enable cron re-scanning'
    rescan_interval:
      type: integer
      label: 'Re-scan interval (seconds)'
    rescan_batch:
      type: integer
      label: 'Max nodes enqueued per cron run'
