services:
  Drupal\accessguard\Hook\RequirementsHooks:
    arguments: ['@accessguard.scan_runner', '@config.factory']
  accessguard.scan_runner:
    class: Drupal\accessguard\Service\ScanRunner
    arguments: ['@http_client', '@config.factory']
  accessguard.pdf_client:
    class: Drupal\accessguard\Service\PdfClient
    arguments: ['@http_client', '@config.factory']
  accessguard.scan_access_token:
    class: Drupal\accessguard\Service\ScanAccessToken
    arguments: ['@private_key', '@datetime.time', '@config.factory']
  accessguard.scan_recorder:
    class: Drupal\accessguard\Service\ScanRecorder
    arguments: ['@entity_type.manager', '@database']
  accessguard.regression:
    class: Drupal\accessguard\Service\RegressionService
    arguments: ['@entity_type.manager']
  accessguard.scan_repository:
    class: Drupal\accessguard\Repository\ScanRepository
    arguments: ['@database']
  accessguard.waiver_matcher:
    class: Drupal\accessguard\Service\WaiverMatcher
    arguments: ['@entity_type.manager', '@lock']
  accessguard.violation_analytics:
    class: Drupal\accessguard\Service\ViolationAnalytics
    arguments: ['@entity_type.manager', '@accessguard.scan_repository', '@accessguard.waiver_matcher', '@current_user']
  accessguard.report_html_builder:
    class: Drupal\accessguard\Service\ReportHtmlBuilder
    arguments: ['@accessguard.violation_analytics', '@entity_type.manager', '@current_user', '@date.formatter', '@config.factory', '@datetime.time']
  accessguard.gate_evaluator:
    class: Drupal\accessguard\Service\GateEvaluator
    arguments: ['@entity_type.manager', '@config.factory', '@accessguard.waiver_matcher', '@accessguard.scan_repository', '@accessguard.rescan_policy']
  accessguard.trend_builder:
    class: Drupal\accessguard\Service\TrendBuilder
    arguments: ['@entity_type.manager', '@accessguard.scan_repository', '@current_user', '@date.formatter']
  accessguard.trend_chart_builder:
    class: Drupal\accessguard\Service\TrendChartBuilder
    arguments: ['@string_translation']
  accessguard.rescan_policy:
    class: Drupal\accessguard\Service\RescanPolicy
    arguments: ['@entity_type.manager', '@config.factory']
