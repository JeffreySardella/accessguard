accessguard.settings:
  type: config_object
  label: 'AccessGuard settings'
  mapping:
    scanner_endpoint:
      type: string
      label: 'Scanner service endpoint'
    scanner_auth_token:
      type: string
      label: 'Scanner service shared-secret token'
    scan_base_url:
      type: string
      label: 'Base URL the scanner uses to reach this site (empty = site default)'
    gate_enabled:
      type: boolean
      label: 'Enable publish gating'
    gate_threshold:
      type: string
      label: 'Gating severity threshold'
    gate_includes_needs_review:
      type: boolean
      label: 'Also block on needs-review (axe incomplete) findings'
    rescan_enabled:
      type: boolean
      label: 'Enable cron re-scanning'
    rescan_interval:
      type: integer
      label: 'Re-scan interval (seconds)'
    rescan_batch:
      type: integer
      label: 'Max nodes enqueued per cron run'
    retention_days:
      type: integer
      label: 'Days to keep old scans (0 = forever; the latest scan per node is always kept)'
